    .gate-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--coral); color: #fff; padding: 13px 26px; border-radius: var(--radius-md); text-decoration: none; font-weight: 700; font-size: 14px; box-shadow: 0 4px 16px var(--coral-soft); transition: all 0.2s; }

    .reminder-tick:hover { background: #ff6b6b !important; transform: translateY(-1px); }
    .reminder-date { font-size: 11px; color: var(--text-muted); font-weight: 600; }

    .empty-icon { font-size: 36px; margin-bottom: 14px; }

<body>
  <div id="app">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p>Loading your weekly report...</p>
    </div>
  </div>

  <script>
    var API              = 'https://peach-dashboard-api.billowing-mountain-8cbc.workers.dev';
    var INTELLIGENCE_API = 'https://peach-intelligence-api.billowing-mountain-8cbc.workers.dev';
    var ADMIN_API        = 'https://peach-admin-api.billowing-mountain-8cbc.workers.dev';

    var state = {
      email:     null,
      accounts:  [],
      account:   null,
      week:      null,
      weeks:     [],
      intel:     null,
      metrics:   null,
      creatives: [],
      topVideo:  null,
      reminders: [],
    };

    function fmt(n){
      if(n===null||n===undefined||isNaN(n))return'0';
      if(n>=1000000)return(n/1000000).toFixed(1)+'M';
      if(n>=1000)return(n/1000).toFixed(1)+'K';
      return Math.round(n).toLocaleString();
    }
    function fmtC(n,cur){
      var s={AED:'AED ',SAR:'SAR ',QAR:'QAR ',KWD:'KWD ',BHD:'BHD ',OMR:'OMR ',GBP:'£',USD:'$',EUR:'€',CAD:'CA$',AUD:'A$',SGD:'S$'}[cur||'']||((cur&&cur.length===3)?cur+' ':'');
      return s+fmt(n);
    }
    function fmtDate(w){
      if(!w)return'';
      var e=new Date(w+'T00:00:00'),s=new Date(e);
      s.setDate(s.getDate()-6);
      var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return s.getDate()+' '+(s.getMonth()===e.getMonth()?'':m[s.getMonth()]+' ')+'– '+e.getDate()+' '+m[e.getMonth()]+' '+e.getFullYear();
    }
    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
    function normId(id){return String(id||'').replace('act_','');}
    function matchAcc(r,acc){
      var id=r.fields.ad_account_id||r.fields['ad_account_id (from account_id)'];
      return normId(id)===normId(acc);
    }

    function showGate(icon,title,msg,extra){
      document.getElementById('app').innerHTML=
        '<div class="gate-wrap"><div class="gate-inner">'+
        '<div class="gate-icon">'+icon+'</div>'+
        '<div class="gate-title">'+title+'</div>'+
        '<div class="gate-body">'+msg+'</div>'+
        (extra||'')+'</div></div>';
    }

    async function loadIntelligence(){
      if(!state.account||!state.email)return;
      try{
        var cleanAccId=normId(state.account);
        var url=INTELLIGENCE_API+'/api/weekly-intelligence'
          +'?email='+encodeURIComponent(state.email)
          +'&account_id='+encodeURIComponent(cleanAccId)
          +(state.week?'&week='+encodeURIComponent(state.week):'');
        var d=await(await fetch(url)).json();
        state.intel=d.access===false?null:d;
      }catch(e){state.intel=null;}
    }

    async function loadReminders(){
      if(!state.account)return;
      try{
        var url=INTELLIGENCE_API+'/api/seasonal-reminders?account_id='+encodeURIComponent(state.account);
        var d=await(await fetch(url)).json();
        state.reminders=d.reminders||[];
      }catch(e){state.reminders=[];}
    }

    async function tickReminder(safeKey,airtableId,originalKey){
      var card=document.getElementById('rem-'+safeKey);
      if(card){card.style.opacity='0.4';card.style.pointerEvents='none';}
      try{
        await fetch(INTELLIGENCE_API+'/api/seasonal-reminders/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({season_key:originalKey,airtable_id:airtableId})});
        state.reminders=state.reminders.filter(function(r){return r.season_key!==originalKey;});
        if(card)card.remove();
        if(state.reminders.length===0){var grid=document.querySelector('.reminders-grid');if(grid&&grid.previousElementSibling)grid.previousElementSibling.style.display='none';if(grid)grid.remove();}
      }catch(e){if(card){card.style.opacity='1';card.style.pointerEvents='';}}
    }

    function formatReminderDate(dateStr){
      if(!dateStr)return'';
      var d=new Date(dateStr+'T00:00:00Z');
      var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return d.getUTCDate()+' '+m[d.getUTCMonth()]+' '+d.getUTCFullYear();
    }

    async function loadMetrics(){
      if(!state.account)return;
      try{
        var[bR,sR,dR]=await Promise.all([fetch(API+'/api/baselines'),fetch(API+'/api/summary'),fetch(API+'/api/dashboard')]);
        var baselines=(await bR.json())||[];
        var summary=(await sR.json())||[];
        var dash=(await dR.json())||{};
        var acc=state.account;
        baselines=(Array.isArray(baselines)?baselines:[]).filter(r=>matchAcc(r,acc));
        summary=(Array.isArray(summary)?summary:[]).filter(r=>matchAcc(r,acc));
        var crs=((dash.creatives||[])).filter(r=>matchAcc(r,acc));
        var seen={},weeks=[];
        var addW=arr=>arr.forEach(r=>{var w=r.fields.week_ending_date;if(w&&!seen[w]){seen[w]=true;weeks.push(w);}});
        addW(baselines);addW(summary);
        weeks.sort((a,b)=>new Date(b)-new Date(a));
        state.weeks=weeks;
        if(!state.week&&weeks.length>0)state.week=weeks[0];
        var bl=baselines.find(r=>r.fields.week_ending_date===state.week);
        var rows=summary.filter(r=>r.fields.week_ending_date===state.week);
        var cur={spend:0,revenue:0,purchases:0,leads:0};
        rows.forEach(r=>{cur.spend+=Number(r.fields.spend)||0;cur.revenue+=Number(r.fields.revenue)||0;cur.purchases+=Number(r.fields.purchases)||0;cur.leads+=Number(r.fields.leads)||0;});
        cur.roas=cur.spend>0?cur.revenue/cur.spend:0;
        cur.aov=cur.purchases>0?cur.revenue/cur.purchases:0;
        var rw=weeks.slice(0,4).reverse();
        var tr={roas:[],spend:[]};
        rw.forEach(w=>{var wr=summary.filter(r=>r.fields.week_ending_date===w);var ws=0,wv=0;wr.forEach(r=>{ws+=Number(r.fields.spend)||0;wv+=Number(r.fields.revenue)||0;});tr.roas.push(ws>0?(wv/ws).toFixed(2)+'x':'-');tr.spend.push(ws>0?fmt(ws):'-');});
        var med=bl?{spend:bl.fields.weekly_spend_4w_median||0,revenue:bl.fields.weekly_revenue_4w_median||0,purchases:bl.fields.weekly_purchases_4w_median||0,roas:bl.fields.roas_4w_median||0,aov:bl.fields.aov_4w_median||0,roas_p75:bl.fields.roas_4w_p75||0,roas_p25:bl.fields.roas_4w_p25||0}:null;
        var wh=bl?(bl.fields.weeks_of_history_available||0):0;
        var accRec=state.accounts&&state.accounts.find(function(a){return a.fields.ad_account_id===state.account;});
        var currency=(accRec&&(accRec.fields.account_currency||accRec.fields.currency||accRec.fields.Currency))||(rows[0]&&rows[0].fields.currency)||'';
        var roasPercentile=null;
        if(med&&med.roas_p75&&cur.roas){if(cur.roas>=med.roas_p75)roasPercentile='top 25%';else if(cur.roas>=med.roas)roasPercentile='top 50%';else if(cur.roas>=med.roas_p25)roasPercentile='bottom 50%';else roasPercentile='bottom 25%';}
        var wc=crs.filter(r=>r.fields.week_ending_date===state.week).map(r=>{
          var th=r.fields.thumbnail_url;if(Array.isArray(th)&&th[0])th=th[0].url||th[0];
          var o={name:r.fields.ad_name||'Unknown',thumb:th,link:r.fields.instagram_permalink_url||'',spend:Number(r.fields.spend)||0,purchases:Number(r.fields.purchases)||0,leads:Number(r.fields.leads)||0,revenue:Number(r.fields.revenue)||0,roas:0,fatigue:!!r.fields.fatigue_flag,hookText:r.fields.hook_text||'',videoPlays:Number(r.fields.video_plays)||0,videoP25:Number(r.fields.video_plays_p25)||0,videoP50:Number(r.fields.video_plays_p50)||0,videoP75:Number(r.fields.video_plays_p75)||0,videoP100:Number(r.fields.video_plays_p100)||0,adName:r.fields.ad_name||''};
          o.roas=o.spend>0?o.revenue/o.spend:0;o.hookRate=o.videoPlays>0?(o.videoP25/o.videoPlays)*100:0;return o;
        });
        wc.sort((a,b)=>b.roas-a.roas);
        state.creatives=wc;
        state.topVideo=wc.filter(c=>c.videoPlays>0).sort((a,b)=>b.hookRate-a.hookRate)[0]||null;
        var fatigueCount=wc.filter(c=>c.fatigue).length;
        state.metrics={cur,med,tr,currency,wh,fatigueCount,roasPercentile};
      }catch(e){console.warn('Metrics err',e);}
    }

    function render(){
      var acc=state.account,week=state.week,intel=state.intel,metrics=state.metrics,accounts=state.accounts;
      var accInfo=accounts.find(a=>a.fields.ad_account_id===acc);
      var accName=accInfo?(accInfo.fields.ad_account_name||accInfo.fields.company_name):'Account';
      var logo=null;
      if(accInfo&&accInfo.fields.logo){var l=accInfo.fields.logo;if(Array.isArray(l)&&l[0])logo=l[0].url||l[0];}
      var accInfoCur=(accInfo&&(accInfo.fields.account_currency||accInfo.fields.currency||accInfo.fields.Currency))||null;
      var currency=accInfoCur||(metrics&&metrics.currency)||'';
      var h='<div class="page">';

      h+='<div class="site-header">';
      h+='<video class="header-video" autoplay muted loop playsinline src="https://pub-55dc34ad0599416491f4a8065aa34c72.r2.dev/Light%20Leak%20Transition%2002.mp4"></video>';
      h+='<div class="header-overlay"></div>';
      h+='<div class="header-inner">';
      h+='<div class="header-left">';
      if(logo)h+='<div class="header-logo"><img src="'+logo+'" alt=""></div>';
      else h+='<div class="header-logo">TPS</div>';
      h+='<div><div class="header-title">Weekly Intelligence</div><div class="header-sub">'+esc(accName)+'</div></div>';
      h+='</div>';
      h+='<div class="header-right">';
      if(metrics&&metrics.wh>0)h+='<div class="week-chip"><div class="live-dot"></div>'+metrics.wh+' weeks of your data</div>';
      if(accounts.length>1){h+='<select class="hdr-sel" id="acc-sel">';accounts.forEach(a=>{var s=a.fields.ad_account_id===acc?' selected':'';h+='<option value="'+a.fields.ad_account_id+'"'+s+'>'+esc(a.fields.ad_account_name||a.fields.company_name)+'</option>';});h+='</select>';}
      h+='<select class="hdr-sel" id="week-sel">';
      state.weeks.forEach(w=>{var s=w===week?' selected':'';h+='<option value="'+w+'"'+s+'>'+fmtDate(w)+'</option>';});
      h+='</select>';
      h+='</div></div></div>';

      if(state.reminders&&state.reminders.length>0){
        var SEASONS_BASE_B='https://pub-55dc34ad0599416491f4a8065aa34c72.r2.dev/seasons/';
        var SEASON_IMAGES_B={mothers_day_uae:'mothers_day.jpg.jpg',mothers_day_uk:'mothers_day.jpg.jpg',mothers_day_us_au:'mothers_day.jpg.jpg',eid_al_adha:'eid_ramadan.jpg',eid_al_fitr:'eid_ramadan.jpg',ramadan:'eid_ramadan.jpg',mawlid:'eid_ramadan.jpg',islamic_new_year:'eid_ramadan.jpg'};
        var FALLBACK_COLORS_B={eid_al_adha:'#0d2233',eid_al_fitr:'#0d2233',ramadan:'#0d2233',valentines_day:'#6b1a25',christmas_q4:'#0d3320',white_friday:'#1a2233',black_friday_bfcm:'#111',halloween:'#4a1e00',chinese_new_year:'#5c0a0f',diwali:'#4a3000',uae_national_day:'#002a16',default:'#1a2233'};
        h+='<div class="season-banner" onclick="document.querySelector(\'.reminders-grid\')&&document.querySelector(\'.reminders-grid\').scrollIntoView({behavior:\'smooth\',block:\'start\'})" id="season-banner">';
        state.reminders.forEach(function(r,i){
          var imgFile=SEASON_IMAGES_B[r.season_tag];var bgColor=FALLBACK_COLORS_B[r.season_tag]||FALLBACK_COLORS_B.default;var weeksText=r.weeks_away==1?'1 week away':r.weeks_away+' weeks away';

    function mCard(label,value,median,lowerBetter,display,trend,weeks,featured,percentile,tintClass){
      var ch=median>0?((value-median)/median)*100:0;

      var benchHtml='<div class="m-benchmark"><div class="m-benchmark-arrow '+cls+'">'+arr+'</div><div class="m-benchmark-text '+cls+'">'+benchText+'</div></div>';
      var percHtml=percentile?'<div style="font-size:10px;color:var(--coral);font-weight:600;margin-bottom:10px">'+esc(percentile)+' of your historical range</div>':'';
      var trendHtml='';
      if(trend&&trend.length>1){trendHtml='<div class="m-trend-wrap"><div class="m-trend-label">4-week trend</div><div class="m-trend">';trend.forEach(function(v,i){trendHtml+='<span class="m-trend-val">'+v+'</span>';if(i<trend.length-1)trendHtml+='<span style="color:var(--stone);margin:0 2px;font-size:9px">›</span>';});trendHtml+='</div></div>';}
      var footerHtml='<div class="m-footer">Based on '+weeks+' week'+(weeks!==1?'s':'')+' of your data</div>';
      return '<div class="metric-card '+(tintClass||'')+'"><div class="m-label">'+label+'</div><div class="m-value">'+display+'</div>'+benchHtml+percHtml+trendHtml+footerHtml+'</div>';
    }

    function formatCreativeAnalysis(text){
      if(!text)return'';
      var sectionHeaders={'SCALE THESE':'Scale These','CONSIDER PAUSING':'Consider Pausing','WATCH CLOSELY':'Watch Closely','STUDY':'Study &amp; Replicate','KEY INSIGHT':'Key Insight','NEED':'What We Need'};
      var html=esc(text);
      Object.keys(sectionHeaders).forEach(function(k){var re=new RegExp('(^|\\n)('+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[S]?)(\\s*:?\\s*)','gi');html=html.replace(re,function(m,pre,label,post){return(pre==='\\n'?'\n':pre)+'<span class="ca-hdr">'+sectionHeaders[k]+'</span>\n';});});
      html=html.replace(/([^\n]+?)(\s+Spend\s*:)/gi,function(m,name,rest){var cleaned=name.replace(/^\d+[\.\)]\s*/,'').trim();if(cleaned.length<3)return m;return'<strong class="ca-adname">'+cleaned+'</strong>'+rest;});
      var paras=html.split(/\n\n+/).filter(function(p){return p.trim();});
      if(paras.length>1)return paras.map(function(p){return'<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');
      return'<p>'+html.replace(/\n/g,'<br>')+'</p>';
    }

    function renderBriefFull(b,idx,total){
      var h='<div class="brief-card"><div class="brief-hdr"><div class="brief-num">'+(idx+1)+'</div><div><div class="brief-concept">'+esc(b.concept_name||'Brief '+(idx+1))+'</div>';
      if(b.subheadline)h+='<div class="brief-sub">'+esc(b.subheadline)+'</div>';
      h+='</div></div><div class="brief-body"><div class="brief-full-grid"><div>';
      if(b.hook)h+='<div class="brief-sec"><div class="brief-lbl">Hook</div><div class="brief-hook-text">"'+esc(b.hook)+'"</div></div>';
      if(b.copy_body)h+='<div class="brief-sec"><div class="brief-lbl">Ad copy</div><div class="brief-copy-text">'+esc(b.copy_body)+'</div></div>';
      if(b.cta)h+='<div class="brief-sec"><div class="brief-lbl">Call to action</div><div class="brief-cta-pill">'+esc(b.cta)+'</div></div>';
      h+='</div><div>';
      if(b.visual_concept)h+='<div class="brief-sec"><div class="brief-lbl">Visual concept</div><div class="brief-visual-box">'+esc(b.visual_concept)+'</div></div>';
      if(b.why_it_works)h+='<div class="brief-sec"><div class="brief-why"><div class="brief-lbl">Why this will work</div><div class="brief-why-text">'+esc(b.why_it_works)+'</div></div></div>';
      h+='</div></div>';
      h+='<div class="brief-actions"><a href="/creative-generator" class="brief-btn primary">Generate Creative</a><a class="brief-btn secondary">Send to Designer</a></div>';
      h+='</div></div>';
      return h;
    }

    function switchBrief(idx){
      try{var raw=document.getElementById('briefData');if(!raw)return;var briefs=JSON.parse(raw.textContent);var wrap=document.getElementById('briefActiveWrap');if(!wrap||!briefs[idx])return;wrap.innerHTML=renderBriefFull(briefs[idx],idx,briefs.length);document.querySelectorAll('.brief-side-card').forEach(function(btn,i){btn.style.opacity=i===(idx-1)?'1':'0.7';btn.style.boxShadow=i===(idx-1)?'0 0 0 2px var(--coral), 0 10px 32px rgba(55,71,93,0.22)':'';});}catch(e){console.warn('switchBrief err',e);}
    }

    /* ── INIT ─────────────────────────────────────── */
    async function init(){
      try{
        var email=null;
        if(window.logged_in_user)email=window.logged_in_user.softr_user_email||window.logged_in_user.email;
        if(!email){showGate('','Welcome to The Peach System','Please log in to view your weekly report.');return;}
        state.email=email;

        // ── PLATFORM ACCESS CHECK (team members only) ────────────────────────
        // Checks admin_users.platform_weekly_intelligence for @thedigitalpeach.ae emails.
        // For all client emails this returns { is_admin: false } and does nothing.
        // On any network error it also does nothing — clients are never blocked.
        try{
          var adminCheck=await fetch(
            ADMIN_API+'/api/admin/check-platform-access'
            +'?email='+encodeURIComponent(email)
            +'&field=platform_weekly_intelligence'
          ).then(function(r){return r.json();}).catch(function(){return null;});
          if(adminCheck&&adminCheck.is_admin&&!adminCheck.allowed){
            showGate('🔒','Access Restricted','You don\'t have permission to view this page.');
            return;
          }
        }catch(e){/* fail open — never block on error */}

        var accs=await(await fetch(API+'/api/portal/weekly?email='+encodeURIComponent(email))).json();
        if(!accs||accs.length===0){showGate('','No account found','Your email is not linked to an account yet. Reach out to your account manager to get set up.');return;}

        var allowed=accs.filter(a=>!!a.fields.access_reporting_dashboard);
        if(allowed.length===0){
          showGate('','Getting your account ready',
            'Your weekly report will appear here once your ad account has been connected and verified.',
            '<p style="margin-bottom:28px;font-size:14px;color:var(--text-muted)">This usually takes 24-48 hours. You\'ll receive an email as soon as everything is live.</p>'+
            '<div class="gate-help">Questions? Reach out to your account manager.</div>'+
            '<a href="/client-portal" class="gate-btn">Back to your hub</a>');
          return;
        }

        state.accounts=allowed;
        state.account=allowed[0].fields.ad_account_id;
        await loadMetrics();
        await loadIntelligence();
        await loadReminders();
        render();

      }catch(err){
        document.getElementById('app').innerHTML='<div class="loading-wrap"><p style="color:var(--text-muted)">Something went wrong loading your insights. Please try refreshing.</p></div>';
      }
    }
    init();
  </script>
